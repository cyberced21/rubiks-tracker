name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: dist/*.exe
          - os: ubuntu-latest
            script: build:linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package
        run: npm run ${{ matrix.script }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}